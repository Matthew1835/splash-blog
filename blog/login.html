<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Splash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-nav" id="site-nav"></header>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to comment on posts.</p>
            <div class="form-message error" id="form-message" style="display: none;"></div>
            <form action="" id="login-form">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
            </form>
            <div class="auth-switch">Don't have an account? <a href="register.html">Create one</a></div>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
