<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · Splash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="site-nav" class="site-nav"></header>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Join Splash</h1>
            <p class="subtitle">Create an account to comment on posts.</p>
            <div class="form-message error" id="form-message" style="display: none;"></div>
            <form action="" id="register-form">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="new-password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create account</button>
            </form>
            <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
        </div>
    </div>

    <script type="module" src="js/register.js"></script>
</body>
</html>
