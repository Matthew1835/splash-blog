<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="site-nav" class="site-nav"></header>

    <main class="container">
        <article>
            <div class="post-detail-header" id="post-header"></div>
            <img src="" alt="" class="post-image" id="post-image">
            <div class="post-body" id="post-body"></div>
        </article>

        <hr class="divider">

        <section aria-labelledby="comments-heading">
            <div class="comments-heading" id="comments-heading">Comments</div>
            <div id="comments-list"></div>
            <div id="comments-area" style="margin-top: 20px;"></div>
        </section>
    </main>

    <footer class="site-footer">Splash · The Odin Project Blog API</footer>

    <script type="module" src="js/post.js"></script>
</body>
</html>
