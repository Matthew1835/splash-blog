<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit post · Splash Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="site-nav" class="site-nav"></header>

    <main class="post-form-page">
        <div class="admin-header">
            <h1 id="form-title">New post</h1>
            <div style="display: flex; gap: 8px;">
                <button type="button" id="publish-toggle-btn" class="btn btn-outline" style="display: none;">Publish</button>
                <button type="button" id="delete-btn" class="btn btn-danger" style="display: none;">Delete</button>
            </div>
        </div>

        <div class="form-message error" id="form-message" style="display: none;"></div>

        <form action="" id="post-form" class="post-form">
            <div class="field">
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>
            <div class="field">
                <label for="imageUrl">Cover image URL</label>
                <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
                <div class="field-hint">Optional. Leave blank to show a placeholder cover on the post page.</div>
            </div>
            <div class="field">
                <label for="content">Content</label>
                <textarea id="content" required></textarea>
            </div>
            <div class="post-form-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="index.html" class="btn btn-outline">Cancel</a>
            </div>
        </form>

        <section class="moderation-section" id="moderation-section" style="display: none;">
            <h2>Comments</h2>
            <div id="moderation-comments"></div>
        </section>
    </main>

    <script type="module" src="js/post-form.js"></script>
</body>
</html>
