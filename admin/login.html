<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Splash Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="site-nav" class="site-nav">
        <a href="login.html" class="nav-logo">Splash <span style="color:var(--clay); font-weight:400; font-size:14px;">Admin</span></a>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Admin sign in</h1>
            <p class="subtitle">Manage posts and comments on Splash.</p>
            <div class="form-message error" id="form-message" style="display: none;"></div>
            <form action="" id="login-form">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
